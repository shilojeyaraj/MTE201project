<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>LEGO Brick Measurer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e; color: #eaeaea;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .wrap { width: 100%; max-width: 580px; padding: 1rem; }
    h1 { font-size: 1.2rem; margin-bottom: .2rem; }
    .sub { color: #888; font-size: .83rem; margin-bottom: 1rem; }

    .card {
      background: #16213e; border-radius: 10px;
      padding: .7rem 1rem; margin-bottom: .85rem;
      border-left: 3px solid #ed8936; font-size: .88rem; line-height: 1.5;
    }
    .card.blue  { border-color: #4299e1; }
    .card.green { border-color: #48bb78; }
    .card.red   { border-color: #fc8181; }

    .drop {
      border: 2px dashed #4a5568; border-radius: 12px;
      padding: 2.5rem 1rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop:hover, .drop.over { border-color: #ed8936; background: rgba(237,137,54,.08); }
    .drop input { display: none; }

    canvas {
      width: 100%; display: block; border-radius: 10px; margin-bottom: .85rem;
      cursor: crosshair; touch-action: none;
    }

    .results {
      background: #16213e; border-radius: 10px;
      padding: 1rem 1.2rem; margin-bottom: .85rem; display: none;
    }
    .results .row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: .3rem 0; border-bottom: 1px solid #2d3748;
    }
    .results .row:last-child { border-bottom: none; }
    .results .lbl { color: #aaa; font-size: .88rem; }
    .results .val { color: #48bb78; font-weight: 700; font-size: 1.1rem; }
    .results .note { color: #666; font-size: .8rem; }

    .btn {
      padding: .5rem 1rem; border-radius: 7px; border: none;
      cursor: pointer; font-size: .87rem; font-weight: 500;
      background: #2d3748; color: #eaeaea; margin-right: .5rem; margin-bottom: .5rem;
    }
    .btn-primary { background: #ed8936; color: #1a1a2e; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>LEGO Brick Measurer</h1>
  <p class="sub">Upload a photo, then click to calibrate and measure by pixel count</p>

  <div class="card" id="inst">
    Upload a <strong>top-down photo</strong> of a LEGO brick (studs up) on a plain background.
  </div>

  <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept="image/*">
    <div style="font-size:2.5rem;margin-bottom:.4rem">📷</div>
    <div>Tap to upload photo</div>
  </div>

  <canvas id="cv" style="display:none"></canvas>

  <div id="btnRow" style="display:none;margin-bottom:.85rem">
    <button class="btn" onclick="reset()">Start over</button>
  </div>

  <div class="results" id="res"></div>
</div>

<script>
// ── Constants (LEGO spec) ───────────────────────────────────────────────────────
const LEGO_STUD_MM = 8.0;
const SPANS_MM = [8.0, 16.0, 24.0];  // 1, 2, 3 stud spacings
const REPEATS_PER_SPAN = 5;

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  img: null, scale: 1,           // img ref and display scale
  spanIdx: 0, repeatIdx: 0,     // calibration progress
  calData: {},
  calLines: [],
  axis: 'x',
  pendingClicks: [],            // [p1, p2] for current pair
  step: 'upload',               // upload | calibrate | measure_length | measure_width | done
  lengthPx: null, widthPx: null
};

// ── File load ──────────────────────────────────────────────────────────────────
document.getElementById('fi').onchange = e => {
  const f = e.target.files[0];
  if (!f || !f.type.startsWith('image/')) return;
  const img = new Image();
  img.onload = () => {
    document.getElementById('drop').style.display = 'none';
    state.img = img;
    initCanvas(img);
    promptAxisChoice();
  };
  img.src = URL.createObjectURL(f);
};

const drop = document.getElementById('drop');
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => {
  e.preventDefault(); drop.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    const img = new Image();
    img.onload = () => { document.getElementById('drop').style.display = 'none'; state.img = img; initCanvas(img); promptAxisChoice(); };
    img.src = URL.createObjectURL(f);
  }
};

// ── Canvas ────────────────────────────────────────────────────────────────────
function initCanvas(img) {
  const cv = document.getElementById('cv');
  const maxW = Math.min(548, document.querySelector('.wrap').clientWidth);
  state.scale = maxW / img.naturalWidth;
  cv.width = img.naturalWidth * state.scale;
  cv.height = img.naturalHeight * state.scale;
  cv.style.display = 'block';
  redraw();
  cv.onclick = onCanvasClick;
  document.getElementById('btnRow').style.display = 'flex';
}

function redraw() {
  if (!state.img) return;
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  ctx.drawImage(state.img, 0, 0, cv.width, cv.height);
  // Draw completed calibration/measure lines (faint)
  (state.calLines || []).forEach(({p1,p2}) => {
    ctx.strokeStyle = 'rgba(237,137,54,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  });
  // Current pair
  if (state.pendingClicks.length >= 1) {
    ctx.fillStyle = '#48bb78';
    state.pendingClicks.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fill();
    });
  }
  if (state.pendingClicks.length === 2) {
    const p1 = state.pendingClicks[0], p2 = state.pendingClicks[1];
    ctx.strokeStyle = '#ed8936';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }
}

function onCanvasClick(e) {
  if (!['calibrate', 'measure_length', 'measure_width'].includes(state.step)) return;
  const cv = document.getElementById('cv');
  const rect = cv.getBoundingClientRect();
  const scaleX = cv.width / rect.width;
  const scaleY = cv.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  state.pendingClicks.push({ x, y });
  redraw();
  if (state.pendingClicks.length >= 2) handlePairComplete();
}

// ── Raw pixel measurement (axis-aligned) ────────────────────────────────────────
function rawPx(p1, p2, axis) {
  if (axis === 'x') return Math.abs(p2.x - p1.x);
  return Math.abs(p2.y - p1.y);
}

// ── Axis choice ──────────────────────────────────────────────────────────────
function promptAxisChoice() {
  setInst('Select calibration axis:<br><button class="btn btn-primary" onclick="startCalibration(\'x\')">Horizontal (x)</button> <button class="btn" onclick="startCalibration(\'y\')">Vertical (y)</button>', 'blue');
}

function startCalibration(axis) {
  state.axis = axis;
  state.step = 'calibrate';
  state.spanIdx = 0;
  state.repeatIdx = 0;
  state.calData = { 8: [], 16: [], 24: [] };
  state.calLines = [];
  promptCalibration();
}

// ── Calibration ───────────────────────────────────────────────────────────────
function promptCalibration() {
  const span = SPANS_MM[state.spanIdx];
  const rep = state.repeatIdx + 1;
  setInst(
    `Calibration <strong>${span} mm</strong> — repeat ${rep}/${REPEATS_PER_SPAN}<br>` +
    `Click <strong>2 stud centers</strong> along the ${state.axis === 'x' ? 'horizontal' : 'vertical'} axis.`,
    'blue'
  );
  state.pendingClicks = [];
}

function finishCalibration() {
  // Compute scale: mm/px from each span; use mean of all (8,16,24) for robustness
  const allPx = [], allMm = [];
  SPANS_MM.forEach(mm => {
    const arr = state.calData[mm];
    if (arr && arr.length) {
      const meanPx = arr.reduce((a,b)=>a+b,0) / arr.length;
      allPx.push(meanPx);
      allMm.push(mm);
    }
  });
  if (allPx.length < 1) { setInst('Need at least one calibration span.', 'red'); return; }
  // Scale = mm per px; linear fit through origin: mm = scale * px
  const sumPx2 = allPx.reduce((a,p)=>a+p*p,0);
  const sumPxMm = allPx.reduce((a,p,i)=>a+p*allMm[i],0);
  state.mmPerPx = sumPx2 > 1e-6 ? sumPxMm / sumPx2 : 0.1;
  // Repeatability: std dev of px per mm for each span
  const scales = [];
  SPANS_MM.forEach(mm => {
    const arr = state.calData[mm];
    if (arr && arr.length >= 2) {
      arr.forEach(px => scales.push(mm / px));
    }
  });
  const meanScale = scales.length ? scales.reduce((a,b)=>a+b,0)/scales.length : state.mmPerPx;
  const variance = scales.length ? scales.reduce((a,s)=>a+(s-meanScale)**2,0)/scales.length : 0;
  state.repeatabilityStd = Math.sqrt(variance).toFixed(4);
  state.step = 'measure_length';
  state.measureAxis = state.axis;  // length uses calibration axis
  setInst('Calibration done. Scale: ' + (state.mmPerPx).toFixed(4) + ' mm/px. Repeatability σ: ' + state.repeatabilityStd + '<br>Click <strong>2 stud centers</strong> for the brick <strong>length</strong> (along calibration axis).', 'green');
  state.pendingClicks = [];
}

// ── Measurement ───────────────────────────────────────────────────────────────
function handleMeasureComplete(p1, p2) {
  const axis = state.step === 'measure_length' ? state.measureAxis : (state.measureAxis === 'x' ? 'y' : 'x');
  const raw = axis === 'x' ? Math.abs(p2.x - p1.x) : Math.abs(p2.y - p1.y);
  if (state.step === 'measure_length') {
    state.lengthPx = raw;
    state.step = 'measure_width';
    setInst('Click <strong>2 stud centers</strong> for the brick <strong>width</strong> (perpendicular to length).', 'blue');
  } else {
    state.widthPx = raw;
    state.step = 'done';
    showFinalResults();
  }
  redraw();
}

function handlePairComplete() {
  const p1 = state.pendingClicks[0], p2 = state.pendingClicks[1];
  if (!p1 || !p2) return;
  state.pendingClicks = [];
  redraw();

  if (state.step === 'calibrate') {
    const raw = rawPx(p1, p2, state.axis);
    const span = SPANS_MM[state.spanIdx];
    if (!state.calData[span]) state.calData[span] = [];
    state.calData[span].push(raw);
    if (!state.calLines) state.calLines = [];
    state.calLines.push({ p1, p2 });
    state.repeatIdx++;
    if (state.repeatIdx >= REPEATS_PER_SPAN) {
      state.repeatIdx = 0;
      state.spanIdx++;
      if (state.spanIdx >= SPANS_MM.length) {
        finishCalibration();
        return;
      }
    }
    promptCalibration();
  } else if (state.step === 'measure_length' || state.step === 'measure_width') {
    if (!state.calLines) state.calLines = [];
    state.calLines.push({ p1, p2 });
    handleMeasureComplete(p1, p2);
  }
}

function showFinalResults() {
  const lenMm = (state.lengthPx * state.mmPerPx).toFixed(1);
  const widMm = (state.widthPx * state.mmPerPx).toFixed(1);
  setInst('Measurements complete.', 'green');
  const res = document.getElementById('res');
  res.style.display = 'block';
  let calRows = '';
  SPANS_MM.forEach(mm => {
    const arr = state.calData[mm] || [];
    const mean = arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(0) : '-';
    calRows += `<div class="row"><span class="lbl">${mm} mm (${arr.length}×)</span><span class="note">mean ${mean} px</span></div>`;
  });
  res.innerHTML = `
    <div class="row"><span class="lbl">Length</span><span class="val">${lenMm} mm</span></div>
    <div class="row"><span class="lbl">Width</span><span class="val">${widMm} mm</span></div>
    <div class="row"><span class="lbl">Length (px)</span><span class="note">${state.lengthPx.toFixed(0)} px</span></div>
    <div class="row"><span class="lbl">Width (px)</span><span class="note">${state.widthPx.toFixed(0)} px</span></div>
    <div class="row"><span class="lbl">Scale</span><span class="note">${state.mmPerPx.toFixed(4)} mm/px</span></div>
    <div class="row"><span class="lbl">Repeatability σ</span><span class="note">${state.repeatabilityStd}</span></div>
    ${calRows}`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setInst(html, type) {
  const el = document.getElementById('inst');
  el.innerHTML = html;
  el.className = 'card' + (type === 'blue' ? ' blue' : type === 'green' ? ' green' : type === 'red' ? ' red' : '');
}

function reset() {
  document.getElementById('drop').style.display = 'block';
  document.getElementById('cv').style.display = 'none';
  document.getElementById('res').style.display = 'none';
  document.getElementById('btnRow').style.display = 'none';
  setInst('Upload a <strong>top-down photo</strong> of a LEGO brick (studs up) on a plain background.', '');
  document.getElementById('fi').value = '';
  state = { img: null, step: 'upload' };
}
</script>
</body>
</html>
