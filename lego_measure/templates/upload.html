<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LEGO Image Upload</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1.5rem;
      max-width: 480px;
      margin-inline: auto;
      background: #1a1a2e;
      color: #eaeaea;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .qr-section {
      background: #16213e;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .qr-section p {
      margin: 0 0 0.75rem;
      font-size: 0.875rem;
      color: #aaa;
    }
    #qrcode {
      display: inline-block;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
    }
    .upload-zone {
      border: 2px dashed #4a5568;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #ed8936;
      background: rgba(237, 137, 54, 0.08);
    }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .upload-zone .hint { color: #888; font-size: 0.875rem; }
    .result {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
    }
    .result.success { background: #22543d; color: #9ae6b4; }
    .result.error { background: #742a2a; color: #feb2b2; }
    .result .path { font-family: monospace; word-break: break-all; }
    .result .path a { color: #68d391; }
  </style>
</head>
<body>
  <h1>LEGO Brick Image Upload</h1>
  <p class="subtitle">Scan to upload from phone, or upload directly</p>

  <div class="qr-section">
    <p>Scan this QR code to open this page on your phone and upload an image</p>
    <div id="qrcode"></div>
  </div>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" />
    <div class="icon">📷</div>
    <div>Tap or drag image here (JPG, PNG)</div>
    <div class="hint">Max 16 MB</div>
  </div>

  <div id="result"></div>

  <script>
    // QR code for current page URL (so scanning opens this page on another device)
    const uploadUrl = {{ upload_url | tojson }};
    const fullUrl = (typeof uploadUrl === 'string' && uploadUrl.startsWith('http')) 
      ? uploadUrl 
      : (window.location.origin + (uploadUrl || ''));
    new QRCode(document.getElementById('qrcode'), {
      text: fullUrl,
      width: 180,
      height: 180
    });

    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('fileInput');
    const result = document.getElementById('result');

    function showResult(msg, isError, path) {
      result.innerHTML = '<div class="result ' + (isError ? 'error' : 'success') + '">' + msg +
        (path ? '<br><span class="path">' + path + '</span>' : '') + '</div>';
      result.scrollIntoView({ behavior: 'smooth' });
    }

    function upload(file) {
      if (!file || !file.type.startsWith('image/')) {
        showResult('Please select a JPG or PNG image', true);
        return;
      }
      showResult('Uploading…', false);
      const form = new FormData();
      form.append('file', file);
      fetch('/upload', { method: 'POST', body: form })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            showResult(data.error, true);
          } else if (data.downloadUrl) {
            showResult('Upload complete. Download image:', false,
              '<a href="' + data.downloadUrl + '" target="_blank" rel="noopener">' + data.downloadUrl + '</a>');
          } else {
            showResult('Upload complete. Run measurement with:', false, 'python main.py ' + data.path);
          }
        })
        .catch(err => {
          showResult('Upload failed: ' + err.message, true);
        });
    }

    input.onchange = () => { if (input.files[0]) upload(input.files[0]); };

    zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
    zone.ondragleave = () => zone.classList.remove('dragover');
    zone.ondrop = (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]);
    };
  </script>
</body>
</html>
