<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>LEGO Brick Measurer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e; color: #eaeaea;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .wrap { width: 100%; max-width: 580px; padding: 1rem; }
    h1 { font-size: 1.2rem; margin-bottom: .2rem; }
    .sub { color: #888; font-size: .83rem; margin-bottom: 1rem; }

    .card {
      background: #16213e; border-radius: 10px;
      padding: .7rem 1rem; margin-bottom: .85rem;
      border-left: 3px solid #ed8936; font-size: .88rem; line-height: 1.5;
    }
    .card.blue  { border-color: #4299e1; }
    .card.green { border-color: #48bb78; }
    .card.red   { border-color: #fc8181; }

    .drop {
      border: 2px dashed #4a5568; border-radius: 12px;
      padding: 2.5rem 1rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop:hover, .drop.over { border-color: #ed8936; background: rgba(237,137,54,.08); }
    .drop input { display: none; }
    .drop .ico { font-size: 2.5rem; margin-bottom: .4rem; }
    .drop .hint { color: #888; font-size: .82rem; margin-top: .3rem; }

    canvas { width: 100%; display: block; border-radius: 10px; margin-bottom: .85rem; }

    .spinner {
      display: flex; align-items: center; gap: .6rem;
      color: #888; font-size: .88rem; margin-bottom: .85rem;
    }
    .spinner svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results {
      background: #16213e; border-radius: 10px;
      padding: 1rem 1.2rem; margin-bottom: .85rem; display: none;
    }
    .results .row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: .3rem 0; border-bottom: 1px solid #2d3748;
    }
    .results .row:last-child { border-bottom: none; }
    .results .lbl { color: #aaa; font-size: .88rem; }
    .results .val { color: #48bb78; font-weight: 700; font-size: 1.1rem; }
    .results .note { color: #666; font-size: .8rem; }

    .btn {
      padding: .5rem 1rem; border-radius: 7px; border: none;
      cursor: pointer; font-size: .87rem; font-weight: 500;
      background: #2d3748; color: #eaeaea; transition: opacity .15s;
      margin-bottom: .85rem;
    }
    .btn:active { opacity: .7; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>LEGO Brick Measurer</h1>
  <p class="sub">Upload a photo — dimensions appear automatically</p>

  <div class="card" id="inst">
    Take a <strong>top-down photo</strong> with the <strong>studs facing up</strong>,
    on a plain background. Then upload it below.
  </div>

  <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept="image/*">
    <div class="ico">📷</div>
    <div>Tap to take or select a photo</div>
    <div class="hint">Shoot straight down · studs up · plain background</div>
  </div>

  <canvas id="cv" style="display:none"></canvas>

  <div class="spinner" id="spin" style="display:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
      <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15"/>
    </svg>
    Detecting studs…
  </div>

  <div class="results" id="res"></div>

  <button class="btn" id="again" style="display:none" onclick="reset()">Try another photo</button>
</div>

<!-- OpenCV.js loaded from official CDN -->
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onCvLoad()"></script>
<script>
let cvOk = false, pendingImg = null;

function onCvLoad() { cvOk = true; if (pendingImg) run(pendingImg); }

// ── File loading ──────────────────────────────────────────────────────────────
function loadFile(f) {
  if (!f || !f.type.startsWith('image/')) return;
  const img = new Image();
  img.onload = () => {
    document.getElementById('drop').style.display = 'none';
    drawPreview(img);
    if (cvOk) run(img); else { pendingImg = img; showSpin(true); setInst('Loading image analysis library…', ''); }
  };
  img.src = URL.createObjectURL(f);
}

document.getElementById('fi').onchange = e => loadFile(e.target.files[0]);
const drop = document.getElementById('drop');
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); loadFile(e.dataTransfer.files[0]); };

// ── Canvas preview ────────────────────────────────────────────────────────────
function drawPreview(img) {
  const cv2 = document.getElementById('cv');
  const maxW = Math.min(548, document.querySelector('.wrap').clientWidth);
  const scale = maxW / img.naturalWidth;
  cv2.width  = img.naturalWidth  * scale;
  cv2.height = img.naturalHeight * scale;
  cv2.style.display = 'block';
  cv2.getContext('2d').drawImage(img, 0, 0, cv2.width, cv2.height);
  cv2._dispScale = scale;
  cv2._img = img;
}

// ── Main analysis ─────────────────────────────────────────────────────────────
function run(img) {
  showSpin(true);
  setInst('Detecting studs…', '');
  // Run in next tick so spinner renders first
  setTimeout(() => {
    try { analyze(img); }
    catch (e) { showError('Analysis crashed: ' + e.message); }
  }, 50);
}

function analyze(img) {
  // Downsample to max 1400px for speed
  const MAX = 1400;
  const sc  = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
  const W   = Math.round(img.naturalWidth  * sc);
  const H   = Math.round(img.naturalHeight * sc);

  const oc = Object.assign(document.createElement('canvas'), { width: W, height: H });
  oc.getContext('2d').drawImage(img, 0, 0, W, H);

  const src    = cv.imread(oc);
  const gray   = new cv.Mat();
  const blur   = new cv.Mat();
  const circles = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(7, 7), 1.5, 1.5);

  const dim    = Math.min(W, H);
  const minR   = Math.max(4, Math.floor(dim * 0.008));
  const maxR   = Math.floor(dim * 0.09);
  const minDst = Math.floor(minR * 1.8);

  // Try decreasing accumulator thresholds until we find enough circles
  let found = false;
  for (const p2 of [35, 25, 18, 13]) {
    cv.HoughCircles(blur, circles, cv.HOUGH_GRADIENT, 1, minDst, 80, p2, minR, maxR);
    if (circles.cols >= 2) { found = true; break; }
  }

  src.delete(); gray.delete(); blur.delete();

  if (!found || circles.cols < 2) {
    circles.delete();
    showError('Could not detect studs automatically.\n\nTips:\n• Shoot straight down, studs facing up\n• Use a plain white/dark background\n• Ensure good, even lighting\n• Move closer to fill the frame with the brick');
    return;
  }

  // Extract circles
  const raw = [];
  for (let i = 0; i < circles.cols; i++) {
    raw.push({ x: circles.data32F[i*3], y: circles.data32F[i*3+1], r: circles.data32F[i*3+2] });
  }
  circles.delete();

  // Filter by consistent radius (remove non-stud circles)
  const sorted = raw.map(c => c.r).sort((a,b)=>a-b);
  const medR   = sorted[Math.floor(sorted.length / 2)];
  const studs  = raw.filter(s => Math.abs(s.r - medR) / medR < 0.38);

  if (studs.length < 2) { showError('Too few studs detected. Try better lighting.'); return; }

  // Scale calibration: nearest-neighbor distance = 8mm between stud centers
  const nnDists = studs.map(a => {
    return Math.min(...studs.filter(b => b !== a).map(b => Math.hypot(a.x-b.x, a.y-b.y)));
  }).sort((a,b)=>a-b);
  const studSpacePx = nnDists[Math.floor(nnDists.length / 2)]; // median
  const pxPerMm    = studSpacePx / 8;

  // Stud grid extent
  const xs = studs.map(s => s.x), ys = studs.map(s => s.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);

  const nX = Math.round((maxX - minX) / studSpacePx) + 1;
  const nY = Math.round((maxY - minY) / studSpacePx) + 1;

  // LEGO outer dimensions: n studs → n×8 − 0.2 mm
  const dimA = +(nX * 8 - 0.2).toFixed(1);
  const dimB = +(nY * 8 - 0.2).toFixed(1);
  const longMm  = Math.max(dimA, dimB);
  const shortMm = Math.min(dimA, dimB);

  // Draw circles on preview canvas
  annotate(studs, medR, sc);

  showSpin(false);
  showResults(nX, nY, longMm, shortMm, studs.length);
}

// ── Overlay detected studs on preview canvas ──────────────────────────────────
function annotate(studs, medR, analysisScale) {
  const cv2 = document.getElementById('cv');
  const ctx  = cv2.getContext('2d');
  const disp = cv2._dispScale;
  // analysisScale: img→analysis pixels; disp: img→canvas pixels
  const factor = disp / analysisScale;

  studs.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * factor, s.y * factor, s.r * factor, 0, Math.PI * 2);
    ctx.strokeStyle = '#ed8936';
    ctx.lineWidth = Math.max(2, cv2.width * 0.004);
    ctx.stroke();
  });
}

// ── Results ───────────────────────────────────────────────────────────────────
function showResults(nX, nY, longMm, shortMm, studCount) {
  setInst(`Detected <strong>${studCount} studs</strong> — ${nX}×${nY} grid`, 'green');
  const res = document.getElementById('res');
  res.style.display = 'block';
  res.innerHTML = `
    <div class="row"><span class="lbl">Length</span><span class="val">${longMm} mm</span></div>
    <div class="row"><span class="lbl">Width</span><span class="val">${shortMm} mm</span></div>
    <div class="row"><span class="lbl">Height</span><span class="note">Take a side-on photo to measure height</span></div>`;
  document.getElementById('again').style.display = 'block';
}

function showError(msg) {
  showSpin(false);
  setInst(msg.replace(/\n/g, '<br>'), 'red');
  document.getElementById('again').style.display = 'block';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setInst(html, type) {
  const el = document.getElementById('inst');
  el.innerHTML = html;
  el.className = 'card' + (type === 'blue' ? ' blue' : type === 'green' ? ' green' : type === 'red' ? ' red' : '');
}
function showSpin(on) { document.getElementById('spin').style.display = on ? 'flex' : 'none'; }

function reset() {
  document.getElementById('drop').style.display = 'block';
  document.getElementById('cv').style.display = 'none';
  document.getElementById('res').style.display = 'none';
  document.getElementById('again').style.display = 'none';
  showSpin(false);
  setInst('Take a <strong>top-down photo</strong> with the <strong>studs facing up</strong>, on a plain background. Then upload it below.', '');
  document.getElementById('fi').value = '';
  pendingImg = null;
}
</script>
</body>
</html>
